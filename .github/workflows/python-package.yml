name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install flake8
        run: python -m pip install --upgrade pip flake8

      - name: Lint with flake8
        run: |
          flake8 port --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 port --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
